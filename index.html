<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam Scorecard Portal</title>
<style>
body{
font-family:Arial;
background:#f2f5f8;
text-align:center;
padding-top:80px;
}
.box{
background:white;
width:400px;
max-width:90%;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}
button{
padding:12px 30px;
font-size:18px;
background:#0a5bd3;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
input{
padding:10px;
width:200px;
margin-top:15px;
font-size:16px;
}
</style>
</head>

<body>

<div class="box">
<h2>Examination Result Portal</h2>
<p>Click below to access your scorecard.</p>

<button onclick="showCaptcha()">
View My Scorecard
</button>

<div id="captchaBox" style="display:none;">
<h3 id="question"></h3>

<input type="number" id="ans" placeholder="Enter Answer">

<br><br>

<button onclick="verify()">
Submit
</button>
</div>
</div>

<script>

let a,b;

function showCaptcha(){
a=Math.floor(Math.random()*10)+1;
b=Math.floor(Math.random()*10)+1;

document.getElementById("captchaBox").style.display="block";

document.getElementById("question").innerHTML=
"Captcha: "+a+" + "+b+" = ?";
}

function verify(){

let x=parseInt(
document.getElementById("ans").value
);

if(x===a+b){

window.location.href=
"https://drive.google.com/file/d/1SxN4-9Sdkx2RNqFSKubiJ2Cedyu7pxrd/view?usp=drive_link";

}
else{
alert("Invalid Captcha");
}
}

</script>

</body>
</html>
