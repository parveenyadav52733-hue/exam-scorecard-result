<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam Scorecard Portal</title>
<style>
body{
font-family:Arial;
background:#f2f5f8;
text-align:center;
padding-top:80px;
}
.box{
background:white;
width:400px;
max-width:90%;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}
button{
padding:12px 30px;
font-size:18px;
background:#0a5bd3;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
input{
padding:10px;
width:200px;
margin-top:15px;
font-size:16px;
}
</style>
</head>

<body>

<div class="box">
<h2>Examination Result Portal</h2>
<p>Click below to access your scorecard.</p>

<button onclick="showCaptcha()">
View My Scorecard
</button>

<div id="captchaBox" style="display:none;">
<h3 id="question"></h3>

<input type="text" id="ans" placeholder="Enter Captcha">

<br><br>

<button onclick="verify()">
Submit
</button>
</div>
</div>

<script>

let captcha = "";

function generateCaptcha() {

    const chars =
    "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";

    captcha = "";

    for(let i=0;i<6;i++)
    {
        captcha += chars.charAt(
            Math.floor(Math.random()*chars.length)
        );
    }

    document.getElementById("captchaBox").style.display = "block";

    document.getElementById("question").innerHTML =
    "Captcha: <b style='font-size:30px;letter-spacing:4px;'>"
    + captcha +
    "</b>";
}

function showCaptcha() {
    generateCaptcha();
}

function verify() {

    let x =
    document.getElementById("ans").value.trim();

    if(x === captcha)
    {
        window.location.href =
        "./CUET(UG)-2026scorecard.pdf";
    }
    else
    {
        alert("Invalid Captcha");
        document.getElementById("ans").value = "";
        generateCaptcha();
    }
}

</script>

</body>
</html>
