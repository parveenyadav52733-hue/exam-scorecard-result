<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Examination Result Portal</title>

<style>

body{
    margin:0;
    background:#f2f2f2;
    font-family:Arial,sans-serif;
}

/* Top Header */

.topHeader{
    background:white;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.col{
    width:30%;
    font-family:Georgia,serif;
    font-weight:600;
    line-height:1.5;
    color:#222;
}

.center{
    font-size:28px;
}

.sub{
    font-size:16px;
    margin-top:6px;
}

.blueStrip{
    height:32px;
    background:#032c5c;
}

/* Result Box */

.container{
    width:680px;
    max-width:95%;
    margin:70px auto;
    background:white;
    border:1px solid #d0d0d0;
}

.header{
    background:#032c5c;
    color:white;
    padding:15px;
    font-size:18px;
    font-weight:bold;
}

.content{
    padding:30px;
}

.row{
    margin-bottom:25px;
}

label{
    display:inline-block;
    width:220px;
}

input[type=text]{
    width:300px;
    padding:10px;
    font-size:16px;
}

.captchaBox{
    display:inline-block;
    background:#1b2f8f;
    color:white;
    padding:8px 20px;
    font-size:30px;
    letter-spacing:3px;
    border-radius:3px;
    user-select:none;
}

.refresh{
    font-size:28px;
    cursor:pointer;
    margin-left:10px;
}

.submitBtn{
    background:#198754;
    color:white;
    border:none;
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
    border-radius:4px;
}

</style>
</head>

<body>

<!-- Top Header -->

<div class="topHeader">

    <!-- LEFT: Emblem + Text -->
    <div class="leftBox">

        <img src="emblem.png" class="emblem" alt="State Emblem">

        <div class="govText">
            <div class="bold">Department of Higher Education</div>
            <div class="bold">Ministry of Education</div>
            <div class="normal">Government of India</div>
        </div>

    </div>

    <!-- CENTER -->
    <div class="col center">
        National Testing Agency
        <div class="sub">
            Common University Entrance Test [CUET (UG)]-2026
        </div>
    </div>

    <!-- RIGHT -->
    <div class="col right">
        Assessment & Testing Services
    </div>

</div>

<div class="blueStrip"></div>

<!-- Result Card -->

<div class="container">

<div class="header">
🔒 View Result
</div>

<div class="content">

<div class="row">
<label>
Enter CAPTCHA
<span style="color:green;">
(case sensitive)
</span> :
</label>

<input
type="text"
id="ans"
placeholder="Enter Captcha">

</div>

<div class="row">

<label>CAPTCHA :</label>

<span
class="captchaBox"
id="captchaText">
</span>

<span
class="refresh"
onclick="generateCaptcha()">
🔄
</span>

</div>

<div class="row">

<button
class="submitBtn"
onclick="verify()">
SUBMIT
</button>

</div>

</div>
</div>

<script>

let captcha="";

function generateCaptcha(){

const chars=
"ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";

captcha="";

for(let i=0;i<6;i++)
{
captcha+=chars.charAt(
Math.floor(Math.random()*chars.length)
);
}

document.getElementById("captchaText")
.innerText=captcha;
}

function verify(){

let x=
document.getElementById("ans")
.value.trim();

if(x===captcha)
{
window.location.href=
"./CUET(UG)-2026scorecard.pdf";
}
else
{
alert("Invalid CAPTCHA");
document.getElementById("ans").value="";
generateCaptcha();
}
}

generateCaptcha();

</script>

</body>
</html>
